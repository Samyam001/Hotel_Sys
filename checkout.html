<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-Out & Payment | Hotel EAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>
    <header class="navbar" id="main-nav">
        <div class="logo">HOTEL EAD</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="room-status.html">Dashboard</a>
        </nav>
        <div class="nav-actions">
            <a href="index.html" class="btn btn-outline" style="border: 1px solid white; color: white;">LOGOUT</a>
        </div>
    </header>

    <main class="page-content" style="padding-top: 100px; padding-bottom: 50px;">
        <div class="form-container">
            <div class="form-header">
                <span class="subtitle" style="display: block; font-family: var(--font-body); font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase;">Front Desk</span>
                <h2>Check-Out & Payment</h2>
            </div>

            <!-- Lookup Section -->
            <form id="lookupForm" style="margin-bottom: 2rem;">
                <div class="form-group">
                    <label for="bookingId">Booking ID / Room Number</label>
                    <div style="display: flex; gap: 1rem;">
                        <input type="text" id="bookingId" class="form-control" placeholder="EAD-1025 or 201" required>
                        <button type="submit" class="btn btn-primary">Find</button>
                    </div>
                </div>
            </form>

            <div class="divider" style="background-color: var(--glass-border); width: 100%; height: 1px; margin: 2rem 0;"></div>

            <!-- Billing Details (Hidden initially, shown after lookup) -->
            <form id="checkoutForm" novalidate style="display: none;">
                <h3 style="margin-bottom: 1.5rem; font-weight: 400;">Billing Summary for <span id="billName" style="color: var(--primary-color); font-weight: 600;"></span></h3>
                
                <div style="background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem;">
                        <span>Room Charges (3 Nights)</span>
                        <span>$ 450.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem;">
                        <span>Room Service</span>
                        <span>$ 45.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem;">
                        <span>Taxes (13%)</span>
                        <span>$ 64.35</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 0.5rem; margin-top: 0.5rem; font-size: 1.1rem; font-weight: 600; color: var(--primary-color);">
                        <span>Total Due</span>
                        <span>$ 559.35</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="paymentType">Payment Received Via *</label>
                    <select id="paymentType" class="form-control" required>
                        <option value="">Select Method</option>
                        <option value="Cash">Cash</option>
                        <option value="Card">Credit/Debit Card</option>
                        <option value="eSewa">eSewa/Mobile Wallet</option>
                    </select>
                    <span class="error-msg" id="e-paymentType">Payment method is required.</span>
                </div>

                <div class="form-group">
                    <label for="reference">Reference / Transaction ID</label>
                    <input type="text" id="reference" class="form-control" placeholder="Leave blank if cash">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-outline" style="border: 1px solid white; color: white;" onclick="window.location.reload();">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="background: #10b981; color: white;">Process Check-Out & Print Invoice</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('lookupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const bId = document.getElementById('bookingId').value.trim();
            if (bId) {
                // Simulate lookup
                const btn = this.querySelector('button');
                btn.textContent = "Searching...";
                
                setTimeout(() => {
                    btn.textContent = "Find";
                    document.getElementById('billName').textContent = "John Doe (Room " + bId + ")";
                    document.getElementById('checkoutForm').style.display = 'block';
                    document.getElementById('checkoutForm').style.animation = 'fadeIn 0.5s';
                }, 800);
            }
        });

        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const pt = document.getElementById('paymentType');
            const err = document.getElementById('e-paymentType');
            let isValid = true;
            
            pt.classList.remove('is-invalid');
            err.style.display = 'none';
            
            if (!pt.value) {
                pt.classList.add('is-invalid');
                err.style.display = 'block';
                isValid = false;
            }
            
            if (isValid) {
                const btn = document.querySelector('#checkoutForm button[type="submit"]');
                btn.textContent = "Processing...";
                
                setTimeout(() => {
                    alert("Check-out successful! Generating invoice...");
                    window.location.href = "invoice.html";
                }, 1000);
            }
        });
    </script>
</body>
</html>
