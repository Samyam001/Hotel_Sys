<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Hotel EAD</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/contact.css">
</head>

<body>
    <header class="navbar" id="main-nav">
        <div class="logo">HOTEL EAD</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="room.html">Rooms</a>
            <a href="about.html">About Us</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
        <div class="nav-actions" style="display: flex; align-items: center;">
            <a href="login.html" class="btn btn-outline" style="border: 1px solid white; color: white; margin-right: 1rem;">STAFF LOGIN</a>
            <a href="room.html" class="btn btn-primary">BOOK NOW</a>
        </div>
    </header>

    <main class="page-content">
        <div class="contact-container">
            <header class="page-header center">
                <h1 class="title">Contact Us</h1>
            </header>

            <form class="contact-form" onsubmit="event.preventDefault();">
                <div class="form-row">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter a valid email address">
                    </div>
                    <div class="input-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Enter your Name">
                    </div>
                </div>
                <div class="input-group" style="margin-bottom: 2rem;">
                    <label for="message">Message / Complaint</label>
                    <textarea id="message" rows="5" placeholder="Write your questions or remarks here..."></textarea>
                </div>
                
                <div class="input-group" style="margin-bottom: 2rem;">
                    <label>Attachments (Photos for complaints)</label>
                    <div style="border: 2px dashed var(--glass-border); border-radius: 8px; padding: 2rem; text-align: center; background: rgba(255,255,255,0.02); cursor: pointer; transition: all 0.2s; position: relative;">
                        <input type="file" id="photoUpload" accept="image/*" multiple style="opacity: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer;">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 0.5rem;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p style="font-size: 0.85rem; color: var(--text-light);">Drag & drop photos here, or <span style="color: var(--primary-color);">browse</span></p>
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">Max file size: 5MB. Supports JPG, PNG.</p>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-submit">SUBMIT</button>
            </form>
            
            <script>
                document.getElementById('photoUpload').addEventListener('change', function(e) {
                    if(e.target.files.length > 0) {
                        const fileNames = Array.from(e.target.files).map(f => f.name).join(', ');
                        e.target.nextElementSibling.nextElementSibling.innerHTML = `<span style="color: #4ade80;">Selected: ${fileNames}</span>`;
                    }
                });
            </script>

            <div class="info-section">
                <!-- Info Block 1 -->
                <div class="info-card">
                    <div class="icon-circle">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </div>
                    <h3>ABOUT HOTEL EAD</h3>
                    <p>Luxury & Comfort</p>
                    <p>Architecture of Silence</p>
                </div>

                <!-- Info Block 2 -->
                <div class="info-card">
                    <div class="icon-circle">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                            </path>
                        </svg>
                    </div>
                    <h3>PHONE</h3>
                    <p>+977 1234567890</p>
                    <p>+977 1234567890</p>
                </div>

                <!-- Info Block 3 -->
                <div class="info-card">
                    <div class="icon-circle">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </div>
                    <h3>OUR LOCATION</h3>
                    <p>Hotel EAD</p>
                    <p>Kathmandu, Nepal</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/contact.js"></script>
</body>

</html>
