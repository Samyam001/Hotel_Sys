<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hotel EAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>
    <header class="navbar" id="main-nav">
        <div class="logo">HOTEL EAD</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="room.html">Rooms</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </nav>
        <div class="nav-actions" style="display: flex; align-items: center;">
            <a href="room.html" class="btn btn-primary">BOOK NOW</a>
        </div>
    </header>

    <main class="page-content" style="display: flex; align-items: center; min-height: 100vh; padding-top: 80px; background-image: radial-gradient(circle at center, rgba(93, 95, 239, 0.15) 0%, transparent 70%);">
        <div class="form-container" style="max-width: 450px;">
            <div class="form-header">
                <span class="subtitle" style="display: block; font-family: var(--font-body); font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase;">Portal Access</span>
                <h2>Staff Login</h2>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@hotelead.com" required>
                    <span class="error-msg" id="e-email">Please enter a valid email.</span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <span class="error-msg" id="e-password">Password is required.</span>
                </div>

                <div class="form-actions" style="flex-direction: column;">
                    <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">Sign In</button>
                    <a href="#" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 1rem; transition: color 0.2s;">Forgot password?</a>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const errEmail = document.getElementById('e-email');
            const errPassword = document.getElementById('e-password');
            
            let isValid = true;
            
            // Reset errors
            email.classList.remove('is-invalid');
            password.classList.remove('is-invalid');
            errEmail.style.display = 'none';
            errPassword.style.display = 'none';
            
            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email.value || !emailRegex.test(email.value)) {
                email.classList.add('is-invalid');
                errEmail.style.display = 'block';
                isValid = false;
            }
            
            // Validate password
            if (!password.value || password.value.length < 6) {
                password.classList.add('is-invalid');
                errPassword.textContent = password.value ? "Password must be at least 6 characters." : "Password is required.";
                errPassword.style.display = 'block';
                isValid = false;
            }
            
            if (isValid) {
                // Simulate login success
                const btn = document.querySelector('button[type="submit"]');
                const origText = btn.textContent;
                btn.textContent = "Authenticating...";
                btn.style.opacity = 0.8;
                
                setTimeout(() => {
                    alert("Login successful. Redirecting to Dashboard.");
                    window.location.href = "room-status.html";
                }, 1500);
            }
        });
    </script>
</body>
</html>
