<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Status Dashboard | Hotel EAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body>
    <header class="navbar" id="main-nav">
        <div class="logo">HOTEL EAD</div>
        <nav class="nav-links">
            <a href="room-status.html" class="active">Dashboard</a>
            <a href="room-management.html">Manage Rooms</a>
            <a href="checkout.html">Check-Out</a>
        </nav>
        <div class="nav-actions">
            <div style="display: flex; align-items: center; gap: 1rem; color: var(--text-muted); font-size: 0.85rem;">
                <span>Admin User</span>
                <a href="index.html" class="btn btn-outline" style="border: 1px solid white; color: white;">LOGOUT</a>
            </div>
        </div>
    </header>

    <main class="page-content" style="padding-top: 100px; padding-bottom: 50px;">
        <div class="report-container dark" style="max-width: 1200px;">
            <div class="report-header">
                <div class="brand-section">
                    <h1>Room Status Overview</h1>
                    <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem;">Live Real-Time View</div>
                </div>
                <div class="report-meta" style="display: flex; gap: 1rem;">
                    <div style="padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 8px; text-align: center;">
                        <div style="font-size: 1.5rem; font-weight: 700; color: #4ade80;">12</div>
                        <div style="font-size: 0.75rem; text-transform: uppercase;">Available</div>
                    </div>
                    <div style="padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 8px; text-align: center;">
                        <div style="font-size: 1.5rem; font-weight: 700; color: #f87171;">8</div>
                        <div style="font-size: 0.75rem; text-transform: uppercase;">Occupied</div>
                    </div>
                    <div style="padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 8px; text-align: center;">
                        <div style="font-size: 1.5rem; font-weight: 700; color: #facc15;">2</div>
                        <div style="font-size: 0.75rem; text-transform: uppercase;">Cleaning/Maint</div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
               <input type="text" class="form-control" placeholder="Search Room / Guest..." style="max-width: 300px;">
               <select class="form-control" style="max-width: 200px;">
                   <option value="All">All Types</option>
                   <option value="Standard">Standard</option>
                   <option value="Premium">Premium</option>
                   <option value="Suite">Suite</option>
               </select>
               <select class="form-control" style="max-width: 200px;">
                   <option value="All">All Statuses</option>
                   <option value="Available">Available</option>
                   <option value="Occupied">Occupied</option>
                   <option value="Cleaning">Cleaning</option>
                   <option value="Maintenance">Maintenance</option>
               </select>
            </div>

            <div style="overflow-x: auto;">
                <table class="data-table" style="color: var(--text-light);">
                    <thead>
                        <tr>
                            <th>Room #</th>
                            <th>Type</th>
                            <th>Current Status</th>
                            <th>Guest Name</th>
                            <th>Check-In</th>
                            <th>Check-Out</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="roomsTableBody">
                        <!-- Dynamic list renders here -->
                    </tbody>
                </table>
            </div>

            <div style="text-align: right; margin-top: 1rem;">
                <a href="room-management.html" class="btn btn-primary" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);">+ Add New Room</a>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Default rooms if empty
            let defaultRooms = [
                { number: "101", type: "Standard", price: "5000", status: "Available", guest: "--", checkIn: "--", checkOut: "--" },
                { number: "201", type: "Premium", price: "15000", status: "Occupied", guest: "John Doe", checkIn: "Oct 15, 2026", checkOut: "Oct 18, 2026" },
                { number: "202", type: "Premium", price: "15000", status: "Cleaning", guest: "--", checkIn: "--", checkOut: "--" },
                { number: "305", type: "Suite", price: "30000", status: "Occupied", guest: "Alice Smith", checkIn: "Oct 10, 2026", checkOut: "Oct 16, 2026" },
                { number: "401", type: "Heritage Suite", price: "50000", status: "Maintenance", guest: "--", checkIn: "--", checkOut: "--" }
            ];

            let rooms = JSON.parse(localStorage.getItem('hotel_rooms'));
            if(!rooms || rooms.length === 0) {
                rooms = defaultRooms;
                localStorage.setItem('hotel_rooms', JSON.stringify(rooms));
            }

            renderTable(rooms);
        });

        function getStatusBadge(status) {
            if(status === 'Available') return '<span class="badge badge-success">Available</span>';
            if(status === 'Occupied') return '<span class="badge badge-danger">Occupied</span>';
            if(status === 'Cleaning') return '<span class="badge badge-warning">Cleaning</span>';
            return '<span class="badge badge-info">Maintenance</span>';
        }

        function updateRoomStatus(roomNum, newStatus) {
            let rooms = JSON.parse(localStorage.getItem('hotel_rooms'));
            let room = rooms.find(r => r.number == roomNum);
            if(room) {
                room.status = newStatus;
                if(newStatus === 'Available' || newStatus === 'Cleaning' || newStatus === 'Maintenance') {
                    room.guest = '--';
                    room.checkIn = '--';
                    room.checkOut = '--';
                }
                localStorage.setItem('hotel_rooms', JSON.stringify(rooms));
                renderTable(rooms);
            }
        }

        function renderTable(rooms) {
            const tBody = document.getElementById('roomsTableBody');
            tBody.innerHTML = '';
            
            // Stats
            let avail = 0, occ = 0, maint = 0;

            rooms.forEach(room => {
                if(room.status === 'Available') avail++;
                else if(room.status === 'Occupied') occ++;
                else maint++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${room.number}</strong></td>
                    <td>${room.type}</td>
                    <td>
                        <select onchange="updateRoomStatus('${room.number}', this.value)" style="background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 2px;">
                            <option value="Available" ${room.status === 'Available' ? 'selected' : ''}>Available</option>
                            <option value="Occupied" ${room.status === 'Occupied' ? 'selected' : ''}>Occupied</option>
                            <option value="Cleaning" ${room.status === 'Cleaning' ? 'selected' : ''}>Cleaning</option>
                            <option value="Maintenance" ${room.status === 'Maintenance' ? 'selected' : ''}>Maintenance</option>
                        </select>
                    </td>
                    <td>${room.guest}</td>
                    <td>${room.checkIn}</td>
                    <td>${room.checkOut}</td>
                    <td>
                        <a href="checkout.html" style="color: #4ade80; font-size: 0.85rem; margin-right: 0.5rem; display: ${room.status === 'Occupied' ? 'inline' : 'none'}">Check Out</a>
                        <a href="#" style="color: var(--primary-color); font-size: 0.85rem;">Edit</a>
                    </td>
                `;
                tBody.appendChild(tr);
            });

            // Update stats visually
            document.querySelectorAll('.report-meta > div')[0].children[0].textContent = avail;
            document.querySelectorAll('.report-meta > div')[1].children[0].textContent = occ;
            document.querySelectorAll('.report-meta > div')[2].children[0].textContent = maint;
        }
    </script>
</body>
</html>
