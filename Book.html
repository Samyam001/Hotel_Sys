<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Now | Hotel EAD</title>

<link rel="stylesheet" href="css/contact.css">
<link rel="stylesheet" href="css/global.css">

</head>

<body>

<!-- Navigation -->
<header class="navbar" id="main-nav">
        <div class="logo">HOTEL EAD</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="room.html">Rooms</a>
            <a href="about.html">About Us</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
        <div class="nav-actions">
            <a href="Book.html" class="btn btn-primary" id="btn-book-nav">BOOK NOW</a>
        </div>
    </header>


<!-- Book Now Section -->
<section class="page-content">

<div class="contact-container">

<div class="page-header center">
<h1 class="title">Book Now</h1>
<p class="subtitle">Reserve your luxury stay at Hotel EAD</p>
</div>


<form class="contact-form">

<div class="form-row">
<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Enter your email" required>
</div>
</div>


<div class="form-row">
<div class="input-group">
<label>Phone</label>
<input type="text" placeholder="Enter phone number" required>
</div>

<div class="input-group">
<label>Room Type</label>
<select required>
<option value="">Select Room</option>
<option>Single Room</option>
<option>Double Room</option>
<option>Deluxe Room</option>
<option>Suite</option>
</select>
</div>
</div>


<div class="form-row">
<div class="input-group">
<label>Check In</label>
<input type="date" required>
</div>

<div class="input-group">
<label>Check Out</label>
<input type="date" required>
</div>
</div>


<div class="form-row">
<div class="input-group">
<label>Guests</label>
<input type="number" placeholder="Number of guests" min="1">
</div>

<div class="input-group">
<label>Payment Method</label>
<select>
<option>Cash</option>
<option>Credit Card</option>
<option>Online Payment</option>
</select>
</div>
</div>


<div class="form-row">
<div class="input-group">
<label>Special Request</label>
<textarea placeholder="Write your request..."></textarea>
</div>
</div>


<button type="submit" class="btn-submit">BOOK NOW</button>

</form>


<!-- Info Section -->
<div class="info-section">

<div class="info-card">
<div class="icon-circle">ℹ</div>
<h3>ABOUT HOTEL EAD</h3>
<p>Luxury & Comfort</p>
<p>Architecture of Silence</p>
</div>

<div class="info-card">
<div class="icon-circle">📞</div>
<h3>PHONE</h3>
<p>+977 1234567890</p>
<p>+977 1234567890</p>
</div>

<div class="info-card">
<div class="icon-circle">📍</div>
<h3>OUR LOCATION</h3>
<p>Hotel EAD</p>
<p>Kathmandu, Nepal</p>
</div>

</div>


</div>
</section>


</body>
</html>
